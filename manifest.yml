---
applications:
- name: codecompass
  memory: 512M
  instances: 1
  buildpacks:
    - python_buildpack
  command: uvicorn main:app --host 0.0.0.0 --port $PORT
  env:
    PYTHONUNBUFFERED: true
  services: []
  routes:
    - route: codecompass.mybluemix.net
  health-check-type: http
  health-check-http-endpoint: /health
  timeout: 180

